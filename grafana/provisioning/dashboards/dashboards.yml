# Auto-load any dashboard JSON dropped into /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: edgeops
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
