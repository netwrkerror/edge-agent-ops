# Observability stack for the edge agent ops demo.
#   prometheus  -> scrapes serve_live.py on the host (:8000), UI on :9090
#   grafana     -> auto-provisioned datasource + dashboard, UI on :3000
#
# Everything is code: no click-configuring. `docker compose up` brings the board
# up pre-built. serve_live.py runs on the HOST (not in a container) and the
# containers reach it via host.docker.internal.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: edgeops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      # lets host.docker.internal resolve on Linux too (native on Docker Desktop)
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: edgeops-grafana
    ports:
      - "3000:3000"
    environment:
      # frictionless local demo: anonymous admin, no login form
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
